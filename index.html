<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bar à Cocktail — Seb</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== ÉCRAN LOGIN ===== -->
  <div id="screen-login" class="login-screen hidden">
    <div class="login-card">
      <div class="login-logo">🍸</div>
      <h1 class="login-title">Bar à Cocktail</h1>
      <p class="login-sub">Connexion à votre cave</p>
      <div id="login-error" class="login-error hidden"></div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="input-email" placeholder="seb@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="input-password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn btn-full" id="btn-login">Se connecter</button>
      <button class="btn btn-outline btn-full" id="btn-signup" style="margin-top:10px">Créer un compte</button>
    </div>
  </div>

  <!-- ===== APP PRINCIPALE ===== -->
  <div id="screen-app" class="hidden">

    <header>
      <span style="font-size:1.4rem">🍸</span>
      <h1>Bar à Cocktail</h1>
      <span class="subtitle">v0.3</span>
      <button class="btn-logout" id="btn-logout" title="Déconnexion">⏏</button>
    </header>

    <nav>
      <button class="active" data-tab="cave">🍶 Ma Cave</button>
      <button data-tab="recettes">🍹 Recettes</button>
      <button disabled title="Bientôt">📊 Dashboard</button>
      <button data-tab="concoctions">⚗️ Concoctions</button>
      <button disabled title="Bientôt">🎓 École</button>
      <button data-tab="aacheter">🛒 À acheter</button>
    </nav>

    <main>

      <!-- MA CAVE -->
      <div id="section-cave" class="tab-section">
        <div class="cave-header"><h2>🍶 Ma Cave</h2></div>
        <div id="cave-container"><div class="loading-state">Chargement…</div></div>
      </div>

      <!-- RECETTES -->
      <div id="section-recettes" class="tab-section hidden">
        <div class="cave-header"><h2>🍹 Recettes</h2></div>
        <div id="recettes-container"><div class="loading-state">Chargement…</div></div>
      </div>

      <!-- CONCOCTIONS -->
      <div id="section-concoctions" class="tab-section hidden">
        <div class="cave-header"><h2>⚗️ Concoctions</h2></div>
        <div id="concoctions-container"><div class="loading-state">Chargement…</div></div>
      </div>

      <!-- À ACHETER -->
      <div id="section-aacheter" class="tab-section hidden">
        <div class="cave-header"><h2>🛒 À acheter</h2></div>
        <div id="aacheter-container"><div class="loading-state">Chargement…</div></div>
      </div>

      <!-- ÉQUIPEMENTS (section dépliable) -->
      <details class="equip-details" id="equip-details" ontoggle="onEquipToggle(this)">
        <summary class="equip-summary">
          🔧 Équipements
          <span class="equip-summary-stats" id="equip-summary-stats"></span>
        </summary>
        <div id="equipements-container" class="equip-body">
          <div class="loading-state">Chargement…</div>
        </div>
      </details>

    </main>
  </div>

  <!-- MODAL : FICHE RECETTE -->
  <div class="modal-overlay modal-large" id="modal-fiche-recette">
    <div class="modal modal-fiche">
      <button class="modal-close" onclick="fermerModal('modal-fiche-recette')">✕</button>
      <div class="fiche-contenu"></div>
    </div>
  </div>

  <!-- MODAL : OUVERTURE BOUTEILLE -->
  <div class="modal-overlay" id="modal-ouverture">
    <div class="modal">
      <h3 id="modal-ouverture-titre"></h3>
      <p id="modal-ouverture-texte"></p>
      <div class="modal-conservation" id="modal-conservation-info" style="display:none"></div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="fermerModal('modal-ouverture')">Annuler</button>
        <button class="btn" id="btn-confirmer-ouverture">Confirmer</button>
      </div>
    </div>
  </div>

  <!-- MODAL : CONTENANCE / PESÉE -->
  <div class="modal-overlay" id="modal-contenance">
    <div class="modal">
      <h3 id="modal-contenance-titre"></h3>
      <div class="modal-contenance-body"></div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="fermerModal('modal-contenance')">Annuler</button>
        <button class="btn" id="btn-sauver-contenance">Enregistrer</button>
      </div>
    </div>
  </div>

  <!-- MODAL : INFO -->
  <div class="modal-overlay" id="modal-info">
    <div class="modal">
      <h3 id="modal-info-titre"></h3>
      <p id="modal-info-texte"></p>
      <div class="modal-actions">
        <button class="btn" onclick="fermerModal('modal-info')">Fermer</button>
      </div>
    </div>
  </div>

  <!-- MODAL : AJOUT -->
  <div class="modal-overlay" id="modal-ajout">
    <div class="modal">
      <h3>Ajouter un élément</h3>
      <div class="form-group">
        <label>Catégorie</label>
        <select id="select-categorie-ajout"></select>
      </div>
      <div class="form-group">
        <label>Nom</label>
        <input type="text" id="input-nom-ajout" placeholder="ex: Chartreuse Verte">
      </div>
      <div class="form-group">
        <label>Description (optionnel)</label>
        <input type="text" id="input-detail-ajout" placeholder="ex: Liqueur alpine 55%">
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="fermerModal('modal-ajout')">Annuler</button>
        <button class="btn" id="btn-confirmer-ajout">Ajouter</button>
      </div>
    </div>
  </div>

  <!-- MODAL : AJOUT CONCOCTION -->
  <div class="modal-overlay" id="modal-ajout-concoction">
    <div class="modal">
      <h3>Nouvelle concoction</h3>
      <div class="form-group">
        <label>Nom</label>
        <input type="text" id="input-conc-nom" placeholder="ex: Limoncello maison">
      </div>
      <div class="form-group">
        <label>Type</label>
        <select id="input-conc-type">
          <option value="batch">🧊 Batch frigo</option>
          <option value="maceration">🌿 Macération</option>
          <option value="infusion">☕ Infusion</option>
          <option value="liqueur">🍯 Liqueur maison</option>
        </select>
      </div>
      <div class="form-group">
        <label>Description</label>
        <input type="text" id="input-conc-desc" placeholder="ex: Zestes citrons + vodka + sucre">
      </div>
      <div class="form-group">
        <label>Date de création</label>
        <input type="date" id="input-conc-date">
      </div>
      <div class="form-group">
        <label>Notes (optionnel)</label>
        <input type="text" id="input-conc-notes" placeholder="ex: Ratio, températures, conseils...">
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="fermerModal('modal-ajout-concoction')">Annuler</button>
        <button class="btn" id="btn-sauver-concoction">Créer</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
