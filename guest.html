<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bar de Seb</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0d0d1a; color: #e8d5a8; min-height: 100vh; padding: 24px 16px; }
    .logo { display: flex; align-items: center; gap: 8px; margin-bottom: 24px; }
    .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: #c8a96e; }
    .logo-text { font-size: 13px; font-weight: 500; color: #c8a96e; letter-spacing: 0.08em; }
    .card { background: rgba(200,169,110,0.06); border: 0.5px solid rgba(200,169,110,0.2); border-radius: 14px; padding: 20px; margin-bottom: 16px; }
    .title { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: rgba(232,213,168,0.5); }
    label { display: block; font-size: 12px; color: rgba(232,213,168,0.5); letter-spacing: 0.05em; margin-bottom: 6px; margin-top: 16px; }
    input[type=text] { width: 100%; background: rgba(255,255,255,0.06); border: 0.5px solid rgba(255,255,255,0.15); border-radius: 10px; padding: 12px 14px; color: #e8d5a8; font-size: 15px; }
    input[type=text]::placeholder { color: rgba(232,213,168,0.3); }
    .btn { width: 100%; background: #c8a96e; border: none; border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 600; color: #1a1206; cursor: pointer; margin-top: 20px; }
    .btn-ghost { background: transparent; border: 0.5px solid rgba(200,169,110,0.3); color: #c8a96e; margin-top: 10px; }
    .step-bar { display: flex; gap: 6px; margin-bottom: 20px; }
    .step-dot { height: 4px; flex: 1; background: rgba(200,169,110,0.2); border-radius: 2px; }
    .step-dot.active { background: #c8a96e; }
    .choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
    .choice-btn { background: rgba(255,255,255,0.04); border: 0.5px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 16px 10px; text-align: center; cursor: pointer; transition: all 0.15s; }
    .choice-btn.selected { background: rgba(200,169,110,0.15); border-color: #c8a96e; }
    .choice-icon { font-size: 24px; margin-bottom: 6px; }
    .choice-label { font-size: 13px; color: rgba(232,213,168,0.7); }
    .choice-btn.selected .choice-label { color: #c8a96e; }
    .cocktail-card { background: rgba(255,255,255,0.04); border: 0.5px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 14px; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; cursor: pointer; transition: all 0.15s; }
    .cocktail-card.selected { border-color: #c8a96e; background: rgba(200,169,110,0.08); }
    .cocktail-thumb { width: 48px; height: 48px; border-radius: 10px; background: rgba(200,169,110,0.15); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; overflow: hidden; }
    .cocktail-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .cocktail-name { font-size: 15px; font-weight: 500; }
    .cocktail-meta { font-size: 12px; color: rgba(232,213,168,0.45); margin-top: 2px; }
    .match-badge { margin-left: auto; background: rgba(200,169,110,0.2); color: #c8a96e; font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 600; flex-shrink: 0; }
    .hidden { display: none; }
    .screen { display: none; }
    .screen.active { display: block; }
    .error { color: #e05a4e; font-size: 13px; text-align: center; margin-top: 12px; }
    .success-icon { font-size: 48px; text-align: center; margin-bottom: 16px; }
    input[type=range] { width: 100%; accent-color: #c8a96e; margin: 8px 0; }
    .range-labels { display: flex; justify-content: space-between; font-size: 11px; color: rgba(232,213,168,0.4); }
  </style>
</head>
<body>

<div class="logo"><div class="logo-dot"></div><div class="logo-text">BAR DE SEB</div></div>

<!-- ÉCRAN 1 : ACCUEIL -->
<div class="screen active" id="screen-accueil">
  <div class="card">
    <div class="title">Bonsoir !</div>
    <div class="subtitle">Choisis un pseudo pour la soirée</div>
    <label>TON PRÉNOM OU PSEUDO</label>
    <input type="text" id="input-pseudo" placeholder="Ex : Marie, Tibo…" />
  </div>
  <div id="error-accueil" class="error hidden"></div>
  <button class="btn" onclick="validerAccueil()">Continuer →</button>
</div>

<!-- ÉCRAN 2 : QUESTIONNAIRE -->
<div class="screen" id="screen-questionnaire">
  <div class="step-bar">
    <div class="step-dot active" id="step-1"></div>
    <div class="step-dot" id="step-2"></div>
    <div class="step-dot" id="step-3"></div>
    <div class="step-dot" id="step-4"></div>
    <div class="step-dot" id="step-5"></div>
  </div>
  <div class="card">
    <div id="question-texte" class="title" style="font-size:18px;margin-bottom:16px"></div>
    <div class="choice-grid" id="question-choix"></div>
    <label style="margin-top:20px">INTENSITÉ</label>
    <input type="range" id="question-intensite" min="1" max="5" value="3" />
    <div class="range-labels"><span>Doux</span><span>Intense</span></div>
  </div>
  <button class="btn" onclick="questionSuivante()">Suivant →</button>
</div>

<!-- ÉCRAN 3 : CHOIX COCKTAIL -->
<div class="screen" id="screen-choix">
  <div class="card" style="margin-bottom:16px">
    <div class="title" style="font-size:17px">Cocktails pour toi</div>
    <div class="subtitle" id="choix-subtitle"></div>
  </div>
  <div id="cocktails-liste"></div>
  <button class="btn btn-ghost" onclick="laisserSebChoisir()">Laisser Seb choisir pour moi ✨</button>
</div>

<!-- ÉCRAN 4 : CONFIRMATION -->
<div class="screen" id="screen-confirmation">
  <div class="card" style="text-align:center">
    <div class="success-icon">🍸</div>
    <div class="title" style="font-size:18px;margin-bottom:8px" id="confirm-titre"></div>
    <div class="subtitle" id="confirm-sous-titre"></div>
  </div>
  <div class="card" style="text-align:center;margin-top:8px">
    <div style="font-size:13px;color:rgba(232,213,168,0.5)">Seb prépare ton cocktail…</div>
    <div style="font-size:22px;margin-top:8px">⏳</div>
  </div>
</div>
<!-- ÉCRAN 5 : DÉGUSTATION GUIDÉE -->
<div class="screen" id="screen-degustation">
  <div class="step-bar" id="deg-step-bar">
    <div class="step-dot active"></div>
    <div class="step-dot"></div>
    <div class="step-dot"></div>
    <div class="step-dot"></div>
  </div>
  <div class="card" id="deg-etape-card">
    <div id="deg-etape-titre" style="font-size:13px;opacity:0.5;margin-bottom:8px"></div>
    <div id="deg-etape-question" style="font-size:18px;font-weight:600;margin-bottom:20px"></div>
    <div class="choice-grid" id="deg-etape-choix"></div>
    <label style="margin-top:20px">INTENSITÉ</label>
    <input type="range" id="deg-intensite" min="1" max="5" value="3" />
    <div class="range-labels"><span>Faible</span><span>Intense</span></div>
  </div>
  <button class="btn" id="deg-btn-suivant" onclick="degSuivant()">Suivant →</button>
</div>

<!-- ÉCRAN 6 : SCORE DÉGUSTATION -->
<div class="screen" id="screen-deg-score">
  <div class="card" style="text-align:center;padding:28px">
    <div style="font-size:48px;font-weight:600;color:#c8a96e;margin-bottom:4px" id="deg-score-val"></div>
    <div style="font-size:13px;opacity:0.5;margin-bottom:8px">/ 100</div>
    <div style="font-size:16px;font-weight:500;margin-bottom:16px" id="deg-score-mention"></div>
    <div style="font-size:13px;opacity:0.6" id="deg-score-recette"></div>
  </div>
  <div class="card" id="deg-score-detail" style="margin-top:8px"></div>
</div>
<script>
const SUPABASE_URL = 'https://wqsprjlocuhandhvpytx.supabase.co';
const SUPABASE_KEY = 'sb_publishable_g4pDtkemUi-6VUG6qgVJWw_PAy5YibN';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const params = new URLSearchParams(window.location.search);
const token = params.get('session');
let session = null;
let pseudo = '';
let inviteId = null;
let profilGustatif = { sucre: 0, amer: 0, acide: 0, fruite: 0, fume: 0, floral: 0, epice: 0, cremeux: 0 };
let questionActuelle = 0;
const DEG_ETAPES = [
  { titre: 'VISUEL', question: 'La robe et la couleur…', choix: [
    { label: 'Claire, transparente', icon: '💧', axe: 'acide' },
    { label: 'Dorée, ambrée', icon: '🥃', axe: 'sucre' },
    { label: 'Rouge, rosée', icon: '🌹', axe: 'fruite' },
    { label: 'Trouble, crémeuse', icon: '🌫️', axe: 'cremeux' }
  ]},
  { titre: 'NEZ', question: 'Au nez tu détectes…', choix: [
    { label: 'Fruits frais', icon: '🍋', axe: 'fruite' },
    { label: 'Fleurs, herbes', icon: '🌸', axe: 'floral' },
    { label: 'Fumé, boisé', icon: '🪵', axe: 'fume' },
    { label: 'Épices, chaleur', icon: '🌶', axe: 'epice' }
  ]},
  { titre: 'BOUCHE', question: 'En bouche tu ressens…', choix: [
    { label: 'Sucré, rond', icon: '🍯', axe: 'sucre' },
    { label: 'Amer, végétal', icon: '🌿', axe: 'amer' },
    { label: 'Acide, vif', icon: '⚡', axe: 'acide' },
    { label: 'Crémeux, onctueux', icon: '🍦', axe: 'cremeux' }
  ]},
  { titre: 'FINISH', question: 'La finale est…', choix: [
    { label: 'Courte, légère', icon: '💨', axe: 'acide' },
    { label: 'Longue, persistante', icon: '🔥', axe: 'fume' },
    { label: 'Douce, sucrée', icon: '🍬', axe: 'sucre' },
    { label: 'Amère, sèche', icon: '🍂', axe: 'amer' }
  ]}
];

let degEtapeActuelle = 0;
let degReponses = [];
let degRecette = null;

function lancerDegustation(recetteData) {
  degEtapeActuelle = 0;
  degReponses = Array(DEG_ETAPES.length).fill(null);
  degRecette = recetteData;
  afficherScreen('screen-degustation');
  renderDegEtape(0);
}

function renderDegEtape(index) {
  const etape = DEG_ETAPES[index];
  document.querySelectorAll('#deg-step-bar .step-dot').forEach((d, i) => d.classList.toggle('active', i <= index));
  document.getElementById('deg-etape-titre').textContent = etape.titre;
  document.getElementById('deg-etape-question').textContent = etape.question;
  document.getElementById('deg-etape-choix').innerHTML = etape.choix.map((c, i) => `
    <div class="choice-btn ${degReponses[index] === i ? 'selected' : ''}" onclick="degSelectionner(${i})">
      <div class="choice-icon">${c.icon}</div>
      <div class="choice-label">${c.label}</div>
    </div>
  `).join('');
  document.getElementById('deg-intensite').value = 3;
}

function degSelectionner(i) {
  degReponses[degEtapeActuelle] = i;
  document.querySelectorAll('#deg-etape-choix .choice-btn').forEach((b, idx) => b.classList.toggle('selected', idx === i));
}

function degSuivant() {
  if (degReponses[degEtapeActuelle] === null) return;
  if (degEtapeActuelle < DEG_ETAPES.length - 1) {
    degEtapeActuelle++;
    renderDegEtape(degEtapeActuelle);
  } else {
    calculerScoreDegustation();
  }
}

function calculerScoreDegustation() {
  if (!degRecette) return;
  let score = 0;
  let total = 0;

  DEG_ETAPES.forEach((etape, i) => {
    if (degReponses[i] === null) return;
    const choix = etape.choix[degReponses[i]];
    const axe = choix.axe;
    const intensite = parseInt(document.getElementById('deg-intensite').value);
    const valDetectee = intensite;
    const valReelle = degRecette[`gout_${axe}`] || 0;
    const diff = Math.abs(valDetectee - valReelle);
    score += Math.max(0, 5 - diff);
    total += 5;
  });

  const scoreTotal = total > 0 ? Math.round((score / total) * 100) : 0;
  const mention = scoreTotal >= 85 ? '🏆 Palais d\'expert' : scoreTotal >= 70 ? '👌 Bon palais' : scoreTotal >= 50 ? '🙂 En développement' : '🌱 À travailler';

  afficherScreen('screen-deg-score');
  document.getElementById('deg-score-val').textContent = scoreTotal;
  document.getElementById('deg-score-mention').textContent = mention;
  document.getElementById('deg-score-recette').textContent = degRecette.nom || '';
  document.getElementById('deg-score-detail').innerHTML = `
    <div style="font-size:11px;opacity:0.5;margin-bottom:10px">DÉTAIL PAR ÉTAPE</div>
    ${DEG_ETAPES.map((e, i) => {
      const choix = e.choix[degReponses[i]];
      return `<div style="display:flex;justify-content:space-between;font-size:0.82rem;padding:4px 0;border-bottom:0.5px solid rgba(200,169,110,0.1)">
        <span style="opacity:0.6">${e.titre}</span>
        <span>${choix ? choix.label : '—'}</span>
      </div>`;
    }).join('')}
  `;

  sauvegarderDegustation(scoreTotal);
}

async function sauvegarderDegustation(score) {
  if (!inviteId) return;
  await db.from('sessions_invites')
    .update({ degustation_resultat: { score, reponses: degReponses }, statut: 'termine' })
    .eq('id', inviteId);
}
const QUESTIONS = [
  { texte: 'Tu préfères plutôt…', choix: [
    { label: 'Acidulé, vif', icon: '🍋', profil: { acide: 2 } },
    { label: 'Sucré, rond', icon: '🍯', profil: { sucre: 2 } },
    { label: 'Amer, végétal', icon: '🌿', profil: { amer: 2 } },
    { label: 'Épicé, chaud', icon: '🌶', profil: { epice: 2 } }
  ]},
  { texte: 'Comme arôme, tu aimes…', choix: [
    { label: 'Fruits frais', icon: '🍓', profil: { fruite: 2 } },
    { label: 'Fleurs, herbes', icon: '🌸', profil: { floral: 2 } },
    { label: 'Fumé, boisé', icon: '🪵', profil: { fume: 2 } },
    { label: 'Crémeux, vanillé', icon: '🍦', profil: { cremeux: 2 } }
  ]},
  { texte: 'En bouche tu préfères…', choix: [
    { label: 'Léger et frais', icon: '💧', profil: { acide: 1, sucre: -1 } },
    { label: 'Riche et généreux', icon: '🔥', profil: { cremeux: 1, sucre: 1 } },
    { label: 'Sec et nerveux', icon: '⚡', profil: { amer: 1, acide: 1 } },
    { label: 'Doux et équilibré', icon: '☁️', profil: { sucre: 1, floral: 1 } }
  ]},
  { texte: 'Avec de l\'alcool tu préfères…', choix: [
    { label: 'Peu ou pas', icon: '🌊', profil: { sucre: 1 } },
    { label: 'Modéré', icon: '🌙', profil: {} },
    { label: 'Bien présent', icon: '🔥', profil: { amer: 1 } },
    { label: 'Corsé', icon: '💥', profil: { amer: 2, fume: 1 } }
  ]},
  { texte: 'Ce soir tu as envie de…', choix: [
    { label: 'Festif, pétillant', icon: '🎉', profil: { acide: 1, fruite: 1 } },
    { label: 'Lounge, relaxant', icon: '🌙', profil: { cremeux: 1, floral: 1 } },
    { label: 'Exotique, surprenant', icon: '🌴', profil: { fume: 1, epice: 1 } },
    { label: 'Classique, raffiné', icon: '🎩', profil: { amer: 1, floral: 1 } }
  ]}
];

let reponsesQuestionnaire = Array(QUESTIONS.length).fill(null);

async function init() {
  if (!token) { afficherErreur('Lien invalide — scanne le QR code du bar.'); return; }
  const { data, error } = await db.from('sessions_invites').select('*').eq('token', token).single();
  if (error || !data) { afficherErreur('Session introuvable ou expirée.'); return; }
  if (new Date(data.expires_at) < new Date()) { afficherErreur('Cette session a expiré.'); return; }
  session = data;
}

function afficherErreur(msg) {
  document.body.innerHTML = `<div style="text-align:center;padding:40px 20px"><div style="font-size:40px;margin-bottom:16px">⚠️</div><div style="color:#e05a4e;font-size:15px">${msg}</div></div>`;
}

function afficherScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function validerAccueil() {
  pseudo = document.getElementById('input-pseudo').value.trim();
  if (!pseudo) { document.getElementById('error-accueil').textContent = 'Entre un prénom ou pseudo.'; document.getElementById('error-accueil').classList.remove('hidden'); return; }
  afficherScreen('screen-questionnaire');
  afficherQuestion(0);
}

function afficherQuestion(index) {
  questionActuelle = index;
  document.querySelectorAll('.step-dot').forEach((d, i) => d.classList.toggle('active', i <= index));
  const q = QUESTIONS[index];
  document.getElementById('question-texte').textContent = q.texte;
  document.getElementById('question-choix').innerHTML = q.choix.map((c, i) => `
    <div class="choice-btn ${reponsesQuestionnaire[index] === i ? 'selected' : ''}" onclick="selectionnerChoix(${i})">
      <div class="choice-icon">${c.icon}</div>
      <div class="choice-label">${c.label}</div>
    </div>
  `).join('');
}

function selectionnerChoix(i) {
  reponsesQuestionnaire[questionActuelle] = i;
  document.querySelectorAll('.choice-btn').forEach((b, idx) => b.classList.toggle('selected', idx === i));
}

function questionSuivante() {
  if (reponsesQuestionnaire[questionActuelle] === null) return;
  const q = QUESTIONS[questionActuelle];
  const choix = q.choix[reponsesQuestionnaire[questionActuelle]];
  const intensite = parseInt(document.getElementById('question-intensite').value);
  Object.entries(choix.profil).forEach(([k, v]) => { profilGustatif[k] = (profilGustatif[k] || 0) + v * (intensite / 3); });

  if (questionActuelle < QUESTIONS.length - 1) {
    afficherQuestion(questionActuelle + 1);
  } else {
    afficherChoixCocktails();
  }
}

async function afficherChoixCocktails() {
  afficherScreen('screen-choix');
const ids = session.recettes_disponibles || [];
console.log('ids:', ids, 'session:', session.token);

  const { data: recettesData, error: errRecettes } = await db.from('recettes').select('id, nom, base_alcool, gout_sucre, gout_amer, gout_acide, gout_fruite, gout_fume, gout_floral, gout_epice, gout_cremeux, photo_url').in('id', ids);
console.log('recettesData:', recettesData, 'errRecettes:', errRecettes);

  const scored = (recettesData || []).map(r => {
    const axes = ['sucre','amer','acide','fruite','fume','floral','epice','cremeux'];
    let score = 0, total = 0;
    axes.forEach(a => {
      const rv = r[`gout_${a}`] || 0;
      const pv = profilGustatif[a] || 0;
      if (rv > 0 || pv > 0) { score += Math.max(0, 5 - Math.abs(rv - pv)); total += 5; }
    });
    return { ...r, score: total > 0 ? Math.round((score / total) * 100) : 50 };
  }).sort((a, b) => b.score - a.score);

  if (session.mode_choix === 'verrouille') {
    await envoyerProfil(null, 'seb');
    afficherScreen('screen-confirmation');
    document.getElementById('confirm-titre').textContent = 'Seb choisit pour toi !';
    document.getElementById('confirm-sous-titre').textContent = 'Ton profil gustatif a été envoyé.';
    return;
  }

  document.getElementById('choix-subtitle').textContent = `${scored.length} cocktail(s) correspondent à ton profil`;
  document.getElementById('cocktails-liste').innerHTML = scored.map(r => `
    <div class="cocktail-card" onclick="selectionnerCocktail('${r.id}', this)">
      <div class="cocktail-thumb">
        ${r.photo_url ? `<img src="${r.photo_url}" alt="${r.nom}" />` : '🍸'}
      </div>
      <div>
        <div class="cocktail-name">${r.nom}</div>
        <div class="cocktail-meta">${r.base_alcool || ''}</div>
      </div>
      <div class="match-badge">${r.score}%</div>
    </div>
  `).join('');
}

let cocktailChoisi = null;

function selectionnerCocktail(id, el) {
  cocktailChoisi = id;
  document.querySelectorAll('.cocktail-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  setTimeout(() => confirmerCocktail(), 400);
}

async function confirmerCocktail() {
  if (!cocktailChoisi) return;
  await envoyerProfil(cocktailChoisi, 'invite');
  afficherScreen('screen-confirmation');
  document.getElementById('confirm-titre').textContent = 'Parfait !';
  document.getElementById('confirm-sous-titre').textContent = 'Seb prépare ton cocktail.';
}

async function laisserSebChoisir() {
  await envoyerProfil(null, 'seb');
  afficherScreen('screen-confirmation');
  document.getElementById('confirm-titre').textContent = 'Seb choisit pour toi !';
  document.getElementById('confirm-sous-titre').textContent = 'Fais-lui confiance 😏';
}

async function envoyerProfil(recetteId, choixType) {
  const { data, error } = await db.from('sessions_invites')
    .insert({
      user_id: session.user_id,
      token: Math.random().toString(36).substring(2, 10),
      nom_session: session.nom_session,
      nom_invite: pseudo,
      profil_gustatif: profilGustatif,
      recette_id: recetteId,
      choix_type: choixType,
      statut: 'en_attente',
      is_master: false,
      mode_choix: session.mode_choix,
      recettes_disponibles: session.recettes_disponibles,
      expires_at: session.expires_at
    })
    .select()
    .single();
if (error) console.error('envoyerProfil error:', error);
inviteId = data?.id;
ecouterJeu();
}

function ecouterJeu() {
  console.log('ecouterJeu inviteId=', inviteId);
  if (!inviteId) return;
  db.channel('jeu-' + inviteId)
    .on('postgres_changes', {
      event: 'UPDATE',
      schema: 'public',
      table: 'sessions_invites'
    }, async payload => {
      const jeu = payload.new.jeu_actif;
      if (jeu === 'degustation' && document.getElementById('screen-deg-score').classList.contains('active')) return;
      if (jeu === 'degustation') {
        const recetteId = payload.new.recette_id;
        const { data: r } = await db.from('recettes').select('*').eq('id', recetteId).single();
        lancerDegustation(r);
      }
      // ↓ AJOUTER ICI
      if (jeu === 'devine') {
        const recetteId = payload.new.recette_id;
        const { data: r } = await db.from('recettes').select('*').eq('id', recetteId).single();
        lancerDevine(r);
      }
    })
    .subscribe();
}
}
// Liste fixe de leurres pour le jeu Devine les ingrédients
const LEURRES_INGREDIENTS = [
  'Vodka', 'Gin', 'Rhum blanc', 'Rhum brun', 'Tequila', 'Mezcal', 'Bourbon',
  'Scotch', 'Cognac', 'Calvados', 'Amaretto', 'Cointreau', 'Triple sec',
  'Campari', 'Aperol', 'Vermouth rouge', 'Vermouth dry', 'Chartreuse verte',
  'Chartreuse jaune', 'Bénédictine', 'Marasquin', 'Crème de pêche',
  'Crème de mûre', 'Crème de violette', 'Baileys', 'Kahlúa',
  'Jus de citron jaune', 'Jus de citron vert', 'Jus d\'orange',
  'Jus de pamplemousse', 'Jus d\'ananas', 'Jus de cranberry',
  'Sirop simple', 'Sirop d\'orgeat', 'Sirop d\'agave', 'Sirop de miel',
  'Grenadine', 'Eau gazeuse', 'Tonic', 'Ginger beer', 'Ginger ale',
  'Champagne', 'Prosecco', 'Cola', 'Lait entier', 'Crème liquide',
  'Blanc d\'œuf', 'Aquafaba', 'Angostura bitter', 'Peychaud\'s bitter',
  'Absinthe', 'Menthe fraîche', 'Basilic', 'Concombre', 'Gingembre frais',
  'Cannelle', 'Muscade', 'Sel', 'Sucre brun', 'Miel', 'Marmelade d\'oranges',
  'Sauce Worcestershire', 'Tabasco', 'Jus de tomate', 'Café espresso',
  'Lait de coco', 'Crème de coco', 'Purée de fruit de la passion',
  'Purée de pêche', 'Framboise fraîche', 'Cerise amarena', 'Olive'
];

let devineVraisIngredients = [];
let devineChoix = [];

async function lancerDevine(recette) {
  // Charger les vrais ingrédients depuis recette_ingredients
  const { data: ingredients } = await db
    .from('recette_ingredients')
    .select('nom')
    .eq('recette_id', recette.id);

  devineVraisIngredients = ingredients.map(i => i.nom);

  // Constituer les leurres — exclure ceux qui ressemblent aux vrais
  const vraisLower = devineVraisIngredients.map(v => v.toLowerCase());
  const leurresTous = LEURRES_INGREDIENTS.filter(l =>
    !vraisLower.some(v => l.toLowerCase().includes(v) || v.includes(l.toLowerCase()))
  );

  // Piocher 8 leurres aléatoires
  const leurres = leurresTous
    .sort(() => Math.random() - 0.5)
    .slice(0, 8);

  // Mélanger vrais + leurres
  devineChoix = [...devineVraisIngredients, ...leurres]
    .sort(() => Math.random() - 0.5);

  afficherScreen('screen-devine');
  renderDevine(recette);
}

function renderDevine(recette) {
  const container = document.getElementById('devine-ingredients');
  container.innerHTML = devineChoix.map(ing => `
    <label class="devine-item">
      <input type="checkbox" value="${ing}"> ${ing}
    </label>
  `).join('');
}

function validerDevine() {
  const coches = Array.from(
    document.querySelectorAll('#devine-ingredients input:checked')
  ).map(i => i.value);

  const bons = coches.filter(c =>
    devineVraisIngredients.some(v => v.toLowerCase() === c.toLowerCase())
  ).length;

  const faux = coches.filter(c =>
    !devineVraisIngredients.some(v => v.toLowerCase() === c.toLowerCase())
  ).length;

  const score = Math.max(0, bons - faux);
  const total = devineVraisIngredients.length;

  // Sauvegarder le résultat
  db.from('sessions_invites')
    .update({
      degustation_resultat: {
        jeu: 'devine',
        bons,
        faux,
        score,
        total,
        reponses: coches,
        vrais: devineVraisIngredients
      }
    })
    .eq('id', inviteId)
    .then(() => afficherScoreDevine(score, total, bons, faux));
}

function afficherScoreDevine(score, total, bons, faux) {
  document.getElementById('devine-score-bons').textContent = bons;
  document.getElementById('devine-score-faux').textContent = faux;
  document.getElementById('devine-score-total').textContent = total;
  document.getElementById('devine-score-points').textContent = score;
  afficherScreen('screen-devine-score');
}
init();
init();
</script>
